# ── Lattice PM — nginx config ─────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── PocketBase proxy ──────────────────────────────────────────────────────
    # All /pb/ requests forwarded to the pocketbase container.
    # proxy_buffering off is required for SSE (realtime subscriptions).
    location /pb/ {
        proxy_pass         http://pocketbase:8090/;
        proxy_http_version 1.1;

        # SSE / realtime support
        proxy_set_header   Connection "";
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── React app — SPA fallback ──────────────────────────────────────────────
    # Any path not matched above serves index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively; never cache index.html
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
}
