# ── Lattice PM — Base compose config ─────────────────────────────────────────
# Do not use this file directly.
# Dev:  docker compose up
# Prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:0.23.4
    restart: unless-stopped
    volumes:
      - pb_data:/pb/pb_data
      - ./pb_migrations:/pb/pb_migrations:ro
    healthcheck:
      # Uses sh + /dev/tcp which is built into busybox/Alpine sh — no wget needed.
      # Falls back to wget if /dev/tcp is unavailable (some minimal images strip it).
      test:
        - "CMD-SHELL"
        - >
          (echo > /dev/tcp/localhost/8090) 2>/dev/null ||
          wget -qO- http://localhost:8090/api/health > /dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      pocketbase:
        condition: service_healthy

volumes:
  pb_data:
