# ── Production overrides (Pi) ─────────────────────────────────────────────────
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# App runs on port 80. Put a reverse proxy in front if you need HTTPS.
#
# VITE_PB_URL is baked into the JS bundle at build time — do NOT set it as a
# runtime environment variable. It is passed as a Docker build ARG instead.

services:

  pocketbase:
    ports:
      - "8090:8090"
    restart: always

  app:
    build:
      args:
        VITE_PB_URL: /pb
    ports:
      - "8080:80"
    restart: always
